name: build-minify-deploy
run-name: Build and Minify to gh-pages

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

permissions:
  contents: write

jobs:
  checkout-minify-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secrets into Jekyll Config
        run: |
          echo "env:" >> _config.yml
          echo "  EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}" >> _config.yml
          echo "  EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}" >> _config.yml
          echo "  EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}" >> _config.yml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Minifiers
        run: |
          npm install -g terser csso-cli html-minifier

      - name: Minify Assets
        run: |
          find . -name "*.js" -exec terser {} --compress --mangle -o {} \;
          find . -name "*.css" -exec csso {} -o {} \;

      - name: Push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add all changes (including the .env and minified files)
          git add .
          # Check if there are changes to commit to avoid errors
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m 'Automated build and minify of ${{ github.sha }}'
            git push --force origin main:gh-pages
          fi
