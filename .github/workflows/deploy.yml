name: build-minify-deploy
run-name: Build and Minify to gh-pages

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

permissions:
  contents: write

jobs:
  checkout-minify-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Inject Secrets (Your original logic)
      - name: Inject Secrets
        run: |
          echo "REACT_APP_API_KEY=${{ secrets.MY_API_KEY }}" > .env
          # Note: If Jekyll needs these as environment variables during build, 
          # you can also export them here.

      # 2. Setup Node and Minifiers
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Updated for 2026 standards
      
      - name: Install Minifiers
        run: |
          npm install -g terser csso-cli html-minifier

      # 3. Perform Minification
      - name: Minify Assets
        run: |
          find . -name "*.js" -exec terser {} --compress --mangle -o {} \;
          find . -name "*.css" -exec csso {} -o {} \;

      # 4. Push to gh-pages branch
      - name: Push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add all changes (including the .env and minified files)
          git add .
          # Check if there are changes to commit to avoid errors
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m 'Automated build and minify of ${{ github.sha }}'
            git push --force origin main:gh-pages
          fi
