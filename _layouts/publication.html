<div class="publication">
    <h4>{% if page.type == "paper" %}
    📄
    {% else if page.type == "thesis" %}
    📒
    {% endif %}{{ page.title }}</h4>

    <p class="author_list">
        {{ page.authors | join: ", " | truncatewords: 30 }}
    </p>

    <div class="pub_links">
        <a href="{{page.link}}">{{page.link_name}}</a>
        {% if page.pdf_link != "" -%}
        <a href="{{page.pdf_link}}">PDF</a>
        {%- endif -%}
        {% if page.code_link != "" -%}
        <a href="{{page.code_link}}">Code</a>
        {%- endif -%}
    </div>
</div>
