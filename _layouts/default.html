<script>
  const swup = new Swup({
    plugins: [new SwupPreloadPlugin()]
  });

  // --- NEW: Hamburger Logic ---
  function initHamburger() {
    const menuToggle = document.querySelector('.menu-toggle');
    const mainNav = document.getElementById('main-nav');
    
    if (!menuToggle || !mainNav) return;

    menuToggle.addEventListener('click', () => {
      const isOpen = mainNav.classList.toggle('is-open');
      menuToggle.classList.toggle('active');
      // Prevent scrolling the background when menu is open
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });
  }

  function closeHamburger() {
    const menuToggle = document.querySelector('.menu-toggle');
    const mainNav = document.getElementById('main-nav');
    if (menuToggle && mainNav) {
      menuToggle.classList.remove('active');
      mainNav.classList.remove('is-open');
      document.body.style.overflow = '';
    }
  }

  function updateActiveNav() {
    const currentPath = window.location.pathname;
    const navItems = document.querySelectorAll('.nav-item');

    navItems.forEach(item => {
      const href = item.getAttribute('href');
      const isHome = currentPath === '/' || currentPath === '/index.html';
      const isMatch = (href === '/' && isHome) || (href !== '/' && currentPath.startsWith(href));

      if (isMatch) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });
  }

  // Hook into Swup's lifecycle
  swup.hooks.on('visit:start', (visit) => {
    // NEW: Close menu immediately when a transition starts
    closeHamburger();

    document.getElementById('page-loader').classList.add('is-loading');
    const dest = visit.to.url;

    let section = 'about';
    if (dest === '/' || dest === '/index.html') section = 'about';
    else if (dest.startsWith('/projects')) section = 'projects';
    else if (dest.startsWith('/research')) section = 'research';
    else if (dest.startsWith('/contact')) section = 'contact';
    document.body.dataset.section = section;

    document.querySelectorAll('.nav-item').forEach(item => {
      const href = item.getAttribute('href');
      const isHome = dest === '/' || dest === '/index.html';
      const isMatch = (href === '/' && isHome) || (href !== '/' && dest.startsWith(href));
      item.classList.toggle('pressing', isMatch);
    });
  });

  swup.hooks.on('page:view', () => {
    document.getElementById('page-loader').classList.remove('is-loading');
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('pressing'));
    updateActiveNav();

    const images = document.querySelectorAll('#swup img');
    images.forEach(img => {
      const parent = img.parentNode;
      const newImg = img.cloneNode(true);
      parent.replaceChild(newImg, img);
    });
  });

  // Run on initial page load
  window.addEventListener('DOMContentLoaded', () => {
    updateActiveNav();
    initHamburger(); // Initialize the toggle listener
  });

  function handleSvgViewbox() {
  const nameSvg = document.querySelector('.name-svg');
  if (!nameSvg) return;

  // Create a media query list
  const mobileQuery = window.matchMedia("(max-width: 768px)");
  const smallerMobileQuery = window.matchMedia("(max-width: 420px)");

  function updateViewBox(e) {
    if (e.matches) {
      // nameSvg.setAttribute('viewBox', '-150 -30 1000 124');
      // nameSvg.setAttribute('viewBox', '0 -30 800 124');
      nameSvg.setAttribute('viewBox', '0 -30 700 124');
    } else {
      nameSvg.setAttribute('viewBox', '-350 -30 1433 124');
    }
  }

  function updateSmallerViewBox(e) {
    if (e.matches) {
      // nameSvg.setAttribute('viewBox', '-150 -30 1000 124');
      // nameSvg.setAttribute('viewBox', '0 -30 800 124');
      nameSvg.setAttribute('viewBox', '0 -30 650 124');
    }
  }

  // Register the listener to run whenever the breakpoint is crossed
  mobileQuery.addEventListener('change', updateViewBox);
  smallerMobileQuery.addEventListener('change', updateSmallerViewBox);

  // Run once on load to set the correct initial state
  updateViewBox(mobileQuery);
  updateSmallerViewBox(smallerMobileQuery);
}

// Call it on load
document.addEventListener('DOMContentLoaded', handleSvgViewbox);
</script>

<script>
gsap.registerPlugin(Draggable);

let draggableInstances = [];
const SOPHIA = "SOPHIADIGGS-GALLIGAN";

function initSignature() {
  draggableInstances.forEach(d => d.kill());
  draggableInstances = [];

  const svg = document.querySelector('.site-title svg');
  const characters = Array.from(document.querySelectorAll('.char'));
  if (!svg || characters.length === 0) return;

  // 1. Measure natural design
  gsap.set(characters, { x: 0, y: 0 });

  const charData = characters.map((el, i) => {
    const box = el.getBBox();
    
    if (!el.querySelector('rect.hitbox')) {
      const hitBox = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      hitBox.setAttribute("class", "hitbox");
      hitBox.setAttribute("x", box.x);
      hitBox.setAttribute("y", box.y);
      hitBox.setAttribute("width", box.width);
      hitBox.setAttribute("height", box.height);
      hitBox.setAttribute("fill", "transparent");
      hitBox.style.pointerEvents = "all";
      el.insertBefore(hitBox, el.firstChild);
    }

    return {
      el: el,
      width: box.width,
      naturalX: box.x,
      // Capture original spacing between letters
      nextGap: (i < characters.length - 1) 
        ? (characters[i+1].getBBox().x - (box.x + box.width)) 
        : 0
    };
  });

  const originX = charData[0].naturalX;
  let order = characters.map((_, i) => i);
  let draggingEl = null;
  const animState = characters.map(() => ({ current: 0 }));

  function getDynamicPositions(currentOrder) {
    let cursor = originX;
    return currentOrder.map((charIdx, i) => {
      const xPos = cursor;
      const gap = charData[i] ? charData[i].nextGap : 0;
      cursor += charData[charIdx].width + gap;
      return xPos;
    });
  }

  // 2. Animation Loop
  function updatePositions() {
    const slotXPositions = getDynamicPositions(order);
    order.forEach((charIdx, slotIdx) => {
      if (characters[charIdx] === draggingEl) return;
      const char = charData[charIdx];
      const targetOffset = slotXPositions[slotIdx] - char.naturalX;
      const diff = targetOffset - animState[charIdx].current;
      if (Math.abs(diff) > 0.01) {
        animState[charIdx].current += diff * 0.18;
        gsap.set(char.el, { x: animState[charIdx].current });
      }
    });
    requestAnimationFrame(updatePositions);
  }
  requestAnimationFrame(updatePositions);

  // 3. Draggable
  draggableInstances = Draggable.create(characters, {
    type: "x,y",
    onDragStart: function() {
      draggingEl = this.target;
      gsap.set(this.target, { zIndex: 100 });
    },
    onDrag: function() {
      const charIdx = characters.indexOf(this.target);
      const currentVisualX = charData[charIdx].naturalX + gsap.getProperty(this.target, "x");
      const slots = getDynamicPositions(order);
      let nearestSlot = 0;
      let minDistance = Infinity;
      slots.forEach((slotX, i) => {
        const dist = Math.abs(slotX - currentVisualX);
        if (dist < minDistance) { minDistance = dist; nearestSlot = i; }
      });
      const currentSlot = order.indexOf(charIdx);
      if (nearestSlot !== currentSlot) {
        order.splice(currentSlot, 1);
        order.splice(nearestSlot, 0, charIdx);
      }
    },
    onDragEnd: function() {
      const charIdx = characters.indexOf(this.target);
      const slots = getDynamicPositions(order);
      const slotIdx = order.indexOf(charIdx);
      const finalOffset = slots[slotIdx] - charData[charIdx].naturalX;
      gsap.to(this.target, {
        x: finalOffset, y: 0, duration: 0.6, ease: "elastic.out(1, 0.5)",
        onComplete: () => {
          animState[charIdx].current = finalOffset;
          gsap.set(this.target, { zIndex: "" });
          draggingEl = null;
          check_resorted_for_easter_eggs(order.map(i => SOPHIA[i]).join(''));
        }
      });
    }
  });
  triggerWelcomeWiggle();
}

function check_resorted_for_easter_eggs(order) {
  
  let order_no_dash = order.replace(/-/g, '');
  
  if (order === "NAGILLAG-SGGIDAIHPOS") {
    gsap.to("body", { scaleX: -1, duration: 1, ease: "power2.inOut" });
  }
  
  if (order_no_dash === "AAADGGGGHIIILLNOPSS" || order_no_dash === "SSPONLLIIIHGGGGDAAA") {
    const chars = document.querySelectorAll('.char');
    
    // RE-INIT RESTORED: Recalculate layout for alphabetized widths before animating
    initSignature(); 
    
    chars.forEach((char, i) => {
      const letterColor = `hsl(${(i * 30) % 360}, 80%, 60%)`;
      const paths = char.querySelectorAll('path');
      gsap.to(paths, {
        y: -20, stroke: letterColor, duration: 0.6, ease: "sine.inOut", 
        repeat: -1, yoyo: true, delay: i * 0.1, 
        onStart: () => { 
          paths.forEach(p => { p.style.removeProperty('stroke'); p.style.removeProperty('stroke-width'); }); 
        }
      });
    });
  }
}

function triggerWelcomeWiggle() {
  const characters = document.querySelectorAll('.char');
  characters.forEach((char, i) => {
    const tl = gsap.timeline({ delay: i * 0.08 });
    tl.to(char, { y: -7, duration: 0.2, ease: "sine.out" })
      .to(char, { y: 3, duration: 0.35, ease: "sine.inOut" })
      .to(char, { y: 0, duration: 0.4, ease: "back.out(2)" });
  });
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (document.querySelector('.char.dragging')) return;
    initSignature();
  }, 150);
});

if (document.readyState === "complete") { initSignature(); } 
else { window.addEventListener("load", initSignature); }

if (typeof swup !== 'undefined') {
  swup.hooks.on('page:view', initSignature);
}
</script>

<script>
  // Initial page load bar
  window.addEventListener('load', () => {
    const bar = document.getElementById('page-load-bar');
    if (!bar) return;
    bar.classList.add('done');
    setTimeout(() => {
      bar.classList.add('fade-out');
      setTimeout(() => bar.remove(), 400);
    }, 200);


    const primaryAssets = [
        '/assets/images/sophia_pic.webp',
        '/assets/images/project_thumbnails/luminaria.webp',
        '/assets/images/project_thumbnails/wovenpoem.webp',
        '/assets/images/project_thumbnails/pillowfort.webp',
    ];

    const secondaryAssets = [
        '/assets/images/project_thumbnails/luminaria_hover.webp',
        '/assets/images/project_thumbnails/wovenpoem_hover.webp',
        '/assets/images/project_thumbnails/pillowfort_hover.webp',
    ];

    if ('requestIdleCallback' in window) {
        requestIdleCallback(async () => {
            // Wait for primaries to finish (or at least start) before hovers
            await preloadBatch(primaryAssets);
            
            // Optional: Add a slight delay or wait for another idle period
            requestIdleCallback(() => preloadBatch(secondaryAssets));
        });
    } else {
        preloadBatch(primaryAssets).then(() => preloadBatch(secondaryAssets));
    }
  });

  async function preloadBatch(urls) {
    const promises = urls.map(url => {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = url;
            img.onload = resolve;
            img.onerror = resolve; // Continue even if one fails
        });
    });
    return Promise.all(promises);
  }
</script>
