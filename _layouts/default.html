  <link rel="stylesheet" href="/assets/css/main.css">

  <script src="https://unpkg.com/swup@4"></script>
  <script>
  const swup = new Swup();

  function updateActiveNav() {
    const currentPath = window.location.pathname;
    console.log("Swup changed page to:", currentPath); // Check your console!

    const navItems = document.querySelectorAll('.nav-item');

    navItems.forEach(item => {
      // Get the link destination (e.g., "/projects")
      const href = item.getAttribute('href');
      
      // Logic: If home, match exactly. If other, check if path starts with href.
      const isHome = currentPath === '/' || currentPath === '/index.html';
      const isMatch = (href === '/' && isHome) || (href !== '/' && currentPath.startsWith(href));

      if (isMatch) {
        item.classList.add('active');
        console.log("Activated:", href);
      } else {
        item.classList.remove('active');
      }
    });
  }

  // Hook into Swup's lifecycle
  swup.hooks.on('visit:start', (visit) => {
    document.getElementById('page-loader').classList.add('is-loading');

    // Hold the clicked button in its pressed state while loading
    const dest = visit.to.url;

    // Update body section for spinner color
    let section = 'about';
    if (dest === '/' || dest === '/index.html') section = 'about';
    else if (dest.startsWith('/projects')) section = 'projects';
    else if (dest.startsWith('/research')) section = 'research';
    else if (dest.startsWith('/contact')) section = 'contact';
    document.body.dataset.section = section;

    document.querySelectorAll('.nav-item').forEach(item => {
      const href = item.getAttribute('href');
      const isHome = dest === '/' || dest === '/index.html';
      const isMatch = (href === '/' && isHome) || (href !== '/' && dest.startsWith(href));
      item.classList.toggle('pressing', isMatch);
    });
  });

  swup.hooks.on('page:view', () => {
    document.getElementById('page-loader').classList.remove('is-loading');
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('pressing'));
    updateActiveNav();
  });

  // Run once on initial page load
  window.addEventListener('DOMContentLoaded', updateActiveNav);
</script>

gsap.registerPlugin(Draggable);

function initSignature() {
  const svg = document.querySelector('.site-title svg');
  const characters = Array.from(document.querySelectorAll('.char'));

  if (!svg || characters.length === 0) return;

  const svgRect = svg.getBoundingClientRect();

  // Each char's natural center x in SVG-relative space
  const origins = characters.map(el => {
    const r = el.getBoundingClientRect();
    return {
      cx: (r.left + r.width / 2) - svgRect.left,
      width: r.width
    };
  });

  // Slots = the original painted positions, sorted left to right
  // order[slotIdx] = charIdx currently occupying that slot
  let order = characters.map((_, i) => i);
  let draggingEl = null;
  let dragSlot = null;

  // Per-char lerp state: offset from their origin (in px)
  const anim = characters.map(() => ({ current: 0, target: 0 }));

  // Apply an x offset to a <g> via transform
  function setX(el, px) {
    gsap.set(el, { x: px });
  }

  // Physics loop — lerp non-dragged chars toward their target offset
  let rafId;
  function startLoop() {
    cancelAnimationFrame(rafId);
    function loop() {
      order.forEach((charIdx, slotIdx) => {
        if (characters[charIdx] === draggingEl) return;
        const a = anim[charIdx];
        // Target offset = difference between assigned slot's center and this char's natural center
        a.target = origins[slotIdx].cx - origins[charIdx].cx;
        const diff = a.target - a.current;
        if (Math.abs(diff) > 0.1) {
          a.current += diff * 0.18;
          setX(characters[charIdx], a.current);
        }
      });
      rafId = requestAnimationFrame(loop);
    }
    rafId = requestAnimationFrame(loop);
  }
  startLoop();

  Draggable.create(characters, {
    type: 'x,y',
    dragClickables: true,
    zIndexBoost: true,

    onDragStart: function() {
      draggingEl = this.target;
      const charIdx = characters.indexOf(this.target);
      dragSlot = order.indexOf(charIdx);
      gsap.set(this.target, { zIndex: 100 });
    },

    onDrag: function() {
      const charIdx = characters.indexOf(this.target);

      // Current center of the dragged element in SVG space
      const svgRectNow = svg.getBoundingClientRect();
      const elRect = this.target.getBoundingClientRect();
      const elCenterX = (elRect.left + elRect.width / 2) - svgRectNow.left;

      // Find nearest slot by comparing to each slot's natural center
      let nearest = 0, nearestDist = Infinity;
      order.forEach((_, slotIdx) => {
        const slotCx = origins[slotIdx].cx;
        const d = Math.abs(slotCx - elCenterX);
        if (d < nearestDist) { nearestDist = d; nearest = slotIdx; }
      });

      if (nearest !== dragSlot) {
        const newOrder = [...order];
        const fromIdx = newOrder.indexOf(charIdx);
        newOrder.splice(fromIdx, 1);
        newOrder.splice(nearest, 0, charIdx);
        order = newOrder;
        dragSlot = nearest;
      }
    },

    onDragEnd: function() {
      const charIdx = characters.indexOf(this.target);
      const targetOffsetX = origins[dragSlot].cx - origins[charIdx].cx;
      const targetOffsetY = 0;

      // Read current gsap x,y so elastic starts from where the drag ended
      const currentX = gsap.getProperty(this.target, 'x');
      const currentY = gsap.getProperty(this.target, 'y');

      gsap.fromTo(this.target,
        { x: currentX, y: currentY },
        {
          x: targetOffsetX,
          y: targetOffsetY,
          duration: 0.7,
          ease: 'elastic.out(1, 0.4)',
          onUpdate: () => {
            anim[charIdx].current = gsap.getProperty(this.target, 'x');
          },
          onComplete: () => {
            anim[charIdx].current = targetOffsetX;
            anim[charIdx].target = targetOffsetX;
            gsap.set(this.target, { zIndex: '' });
            draggingEl = null;
          }
        }
      );
    }
  });
}

// Jekyll/Swup compatibility: Run after everything is settled
if (document.readyState === "complete") {
  initSignature();
} else {
  window.addEventListener("load", initSignature);
}

if (typeof swup !== 'undefined') {
  swup.hooks.on('page:view', initSignature);

<script>
  // Initial page load bar
  window.addEventListener('load', () => {
    const bar = document.getElementById('page-load-bar');
    if (!bar) return;
    bar.classList.add('done');
    setTimeout(() => {
      bar.classList.add('fade-out');
      setTimeout(() => bar.remove(), 400);
    }, 200);
  });
</script>
