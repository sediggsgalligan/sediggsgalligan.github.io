<!DOCTYPE html>
<html lang="{{ site.lang | default: " en-US" }}">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <title>{{ page.title }} – Sophia Diggs-Galligan</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Commissioner:wght@100..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/buttons.css">

  <script src="https://unpkg.com/swup@4"></script>
  <script src="https://unpkg.com/@swup/preload-plugin@3"></script>

  <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon/favicon.ico' | relative_url }}">

  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon/favicon-16x16.png' | relative_url }}">

  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon/apple-touch-icon.png' | relative_url }}">

  <link rel="manifest" href="{{ '/assets/favicon/site.webmanifest' | relative_url }}">

<script>
  const swup = new Swup({
    plugins: [new SwupPreloadPlugin()]
  });

  // --- NEW: Hamburger Logic ---
  function initHamburger() {
    const menuToggle = document.querySelector('.menu-toggle');
    const mainNav = document.getElementById('main-nav');
    
    if (!menuToggle || !mainNav) return;

    menuToggle.addEventListener('click', () => {
      const isOpen = mainNav.classList.toggle('is-open');
      menuToggle.classList.toggle('active');
      // Prevent scrolling the background when menu is open
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });
  }

  function closeHamburger() {
    const menuToggle = document.querySelector('.menu-toggle');
    const mainNav = document.getElementById('main-nav');
    if (menuToggle && mainNav) {
      menuToggle.classList.remove('active');
      mainNav.classList.remove('is-open');
      document.body.style.overflow = '';
    }
  }

  function updateActiveNav() {
    const currentPath = window.location.pathname;
    const navItems = document.querySelectorAll('.nav-item');

    navItems.forEach(item => {
      const href = item.getAttribute('href');
      const isHome = currentPath === '/' || currentPath === '/index.html';
      const isMatch = (href === '/' && isHome) || (href !== '/' && currentPath.startsWith(href));

      if (isMatch) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });
  }

  // Hook into Swup's lifecycle
  swup.hooks.on('visit:start', (visit) => {
    // NEW: Close menu immediately when a transition starts
    closeHamburger();

    document.getElementById('page-loader').classList.add('is-loading');
    const dest = visit.to.url;

    let section = 'about';
    if (dest === '/' || dest === '/index.html') section = 'about';
    else if (dest.startsWith('/projects')) section = 'projects';
    else if (dest.startsWith('/research')) section = 'research';
    else if (dest.startsWith('/contact')) section = 'contact';
    document.body.dataset.section = section;

    document.querySelectorAll('.nav-item').forEach(item => {
      const href = item.getAttribute('href');
      const isHome = dest === '/' || dest === '/index.html';
      const isMatch = (href === '/' && isHome) || (href !== '/' && dest.startsWith(href));
      item.classList.toggle('pressing', isMatch);
    });
  });

  swup.hooks.on('page:view', () => {
    document.getElementById('page-loader').classList.remove('is-loading');
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('pressing'));
    updateActiveNav();

    const images = document.querySelectorAll('#swup img');
    images.forEach(img => {
      const parent = img.parentNode;
      const newImg = img.cloneNode(true);
      parent.replaceChild(newImg, img);
    });
  });

  // Run on initial page load
  window.addEventListener('DOMContentLoaded', () => {
    updateActiveNav();
    initHamburger(); // Initialize the toggle listener
  });

  function handleSvgViewbox() {
  const nameSvg = document.querySelector('.name-svg');
  if (!nameSvg) return;

  // Create a media query list
  const mobileQuery = window.matchMedia("(max-width: 768px)");
  const smallerMobileQuery = window.matchMedia("(max-width: 420px)");

  function updateViewBox(e) {
    if (e.matches) {
      nameSvg.setAttribute('viewBox', '0 -30 700 124');
    } else {
      nameSvg.setAttribute('viewBox', '-350 -30 1433 124');
    }
  }

  function updateSmallerViewBox(e) {
    if (e.matches) {
      // nameSvg.setAttribute('viewBox', '-150 -30 1000 124');
      // nameSvg.setAttribute('viewBox', '0 -30 800 124');
      nameSvg.setAttribute('viewBox', '0 -30 650 124');
    }
  }

  // Register the listener to run whenever the breakpoint is crossed
  mobileQuery.addEventListener('change', updateViewBox);
  smallerMobileQuery.addEventListener('change', updateSmallerViewBox);

  // Run once on load to set the correct initial state
  updateViewBox(mobileQuery);
  updateSmallerViewBox(smallerMobileQuery);
}

// Call it on load
document.addEventListener('DOMContentLoaded', handleSvgViewbox);
</script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>

<style>
.char {
  cursor: grab;
  display: inline-block; 
  background-color: transparent; 
}

.char path {
  pointer-events: auto; 
}

.char:active {
  cursor: grabbing;
}
</style>

<style>
  /* Prevents the "flash" of original positions during Swup transitions */
  .char { opacity: 0; }
</style>

<script>
gsap.registerPlugin(Draggable);

let draggableInstances = [];
const SOPHIA = "SOPHIADIGGS-GALLIGAN";

// --- PERSISTENCE STATE ---
let currentOrder = null; 
let lastInteractionTime = Date.now();
let hasInteracted = false;
let idleCheckInterval;

function initSignature() {
  draggableInstances.forEach(d => d.kill());
  draggableInstances = [];

  const svg = document.querySelector('.site-title svg');
  const characters = Array.from(document.querySelectorAll('.char'));
  if (!svg || characters.length === 0) return;

  // Initialize order if it's the first run
  if (!currentOrder) {
    currentOrder = characters.map((_, i) => i);
  }

  // 1. Measure natural design
  gsap.set(characters, { x: 0, y: 0 });

  const charData = characters.map((el, i) => {
    const box = el.getBBox();
    
    if (!el.querySelector('rect.hitbox')) {
      const hitBox = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      hitBox.setAttribute("class", "hitbox");
      hitBox.setAttribute("x", box.x);
      hitBox.setAttribute("y", box.y);
      hitBox.setAttribute("width", box.width);
      hitBox.setAttribute("height", box.height);
      hitBox.setAttribute("fill", "transparent");
      hitBox.style.pointerEvents = "all";
      el.insertBefore(hitBox, el.firstChild);
    }

    return {
      el: el,
      width: box.width,
      naturalX: box.x,
      nextGap: (i < characters.length - 1) 
        ? (characters[i+1].getBBox().x - (box.x + box.width)) 
        : 0
    };
  });

  const originX = charData[0].naturalX;
  let draggingEl = null;
  const animState = characters.map((_, i) => {
    // PRE-CALCULATE initial positions to avoid the jump
    const slots = getDynamicPositions(currentOrder);
    const charIdxInOrder = currentOrder.indexOf(i);
    return { current: slots[charIdxInOrder] - charData[i].naturalX };
  });

  function getDynamicPositions(orderArr) {
    let cursor = originX;
    return orderArr.map((charIdx, i) => {
      const xPos = cursor;
      const charWidth = charData[charIdx].width;
      const gap = charData[i] ? charData[i].nextGap : 0;
      cursor += charWidth + gap;
      return xPos;
    });
  }

  // 2. Animation Loop
  function updatePositions() {
    const slotXPositions = getDynamicPositions(currentOrder);
    currentOrder.forEach((charIdx, slotIdx) => {
      if (characters[charIdx] === draggingEl) return;
      const char = charData[charIdx];
      const targetOffset = slotXPositions[slotIdx] - char.naturalX;
      
      const diff = targetOffset - animState[charIdx].current;
      if (Math.abs(diff) > 0.01) {
        animState[charIdx].current += diff * 0.18;
        gsap.set(char.el, { x: animState[charIdx].current });
      }
    });
    requestAnimationFrame(updatePositions);
  }
  requestAnimationFrame(updatePositions);

  // Set initial positions immediately before revealing to prevent flash
  currentOrder.forEach((charIdx, slotIdx) => {
    const slots = getDynamicPositions(currentOrder);
    gsap.set(characters[charIdx], { 
      x: slots[slotIdx] - charData[charIdx].naturalX,
      opacity: 1 // Reveal now that they are in the right place
    });
  });

  // 3. Draggable
  draggableInstances = Draggable.create(characters, {
    type: "x,y",
    onDragStart: function() {
      draggingEl = this.target;
      gsap.set(this.target, { zIndex: 100 });
      resetIdleTimer();
    },
    onDrag: function() {
      const charIdx = characters.indexOf(this.target);
      const currentVisualX = charData[charIdx].naturalX + gsap.getProperty(this.target, "x");
      const slots = getDynamicPositions(currentOrder);
      
      let nearestSlot = 0;
      let minDistance = Infinity;
      slots.forEach((slotX, i) => {
        const dist = Math.abs(slotX - currentVisualX);
        if (dist < minDistance) { minDistance = dist; nearestSlot = i; }
      });

      const currentSlot = currentOrder.indexOf(charIdx);
      if (nearestSlot !== currentSlot) {
        currentOrder.splice(currentSlot, 1);
        currentOrder.splice(nearestSlot, 0, charIdx);
      }
    },
    onDragEnd: function() {
      const charIdx = characters.indexOf(this.target);
      const slots = getDynamicPositions(currentOrder);
      const slotIdx = currentOrder.indexOf(charIdx);
      const finalOffset = slots[slotIdx] - charData[charIdx].naturalX;
      
      gsap.to(this.target, {
        x: finalOffset, y: 0, duration: 0.6, ease: "elastic.out(1, 0.5)",
        onComplete: () => {
          animState[charIdx].current = finalOffset;
          gsap.set(this.target, { zIndex: "" });
          draggingEl = null;
          check_resorted_for_easter_eggs(currentOrder.map(i => SOPHIA[i]).join(''));
        }
      });
    }
  });

  startIdleDetection();
  triggerWelcomeWiggle();
}

// --- IDLE ANIMATION LOGIC ---
function resetIdleTimer() {
  lastInteractionTime = Date.now();
  hasInteracted = true;
}

function triggerAttentionJump() {
  const characters = document.querySelectorAll('.char');
  if (characters.length === 0) return;
  const randomIdx = Math.floor(Math.random() * characters.length);
  const char = characters[randomIdx];
  gsap.timeline()
    .to(char, { y: -30, duration: 0.25, ease: "power2.out" })
    .to(char, { y: 0, duration: 0.45, ease: "bounce.out" });
}

function startIdleDetection() {
  if (idleCheckInterval) clearInterval(idleCheckInterval);
  idleCheckInterval = setInterval(() => {
    const now = Date.now();
    const idleTime = now - lastInteractionTime;
    const threshold = hasInteracted ? 60000 : 30000;
    if (idleTime >= threshold) {
      triggerAttentionJump();
      lastInteractionTime = now - (threshold - 5000);
    }
  }, 1000);
}

// --- UTILITIES & EASTER EGGS ---
function check_resorted_for_easter_eggs(orderStr) {
  let order_no_dash = orderStr.replace(/-/g, '');
  if (orderStr === "NAGILLAG-SGGIDAIHPOS") {
    gsap.to("body", { scaleX: -1, duration: 1, ease: "power2.inOut" });
  }
  if (order_no_dash === "AAADGGGGHIIILLNOPSS" || order_no_dash === "SSPONLLIIIHGGGGDAAA") {
    const chars = document.querySelectorAll('.char');
    resetSignaturePositions(); 
    chars.forEach((char, i) => {
      const letterColor = `hsl(${(i * 30) % 360}, 80%, 60%)`;
      const paths = char.querySelectorAll('path');
      gsap.to(paths, {
        y: -20, stroke: letterColor, duration: 0.6, ease: "sine.inOut", 
        repeat: -1, yoyo: true, delay: i * 0.1
      });
    });
  }
}

function triggerWelcomeWiggle() {
  const characters = document.querySelectorAll('.char');
  const charArray = Array.from(characters);

  // Sort based on where the character's index exists within currentOrder
  const ordered_chars = charArray.sort((a, b) => {
    const idA = charArray.indexOf(a);
    const idB = charArray.indexOf(b);
    
    // Find which "slot" these IDs currently occupy
    return currentOrder.indexOf(idA) - currentOrder.indexOf(idB);
  });

  ordered_chars.forEach((char, i) => {
    const tl = gsap.timeline({ delay: i * 0.08 });
    tl.to(char, { y: -7, duration: 0.2, ease: "sine.out" })
      .to(char, { y: 3, duration: 0.35, ease: "sine.inOut" })
      .to(char, { y: 0, duration: 0.4, ease: "back.out(2)" });
  });
}

function resetSignaturePositions() {
  const characters = document.querySelectorAll('.char');
  if (!characters.length) return;

  currentOrder = Array.from(characters).map((_, i) => i);

  lastInteractionTime = Date.now();
  hasInteracted = false;

  gsap.to(characters, {
    x: 0,
    y: 0,
    duration: 0.8,
    ease: "elastic.out(1, 0.75)",
    stagger: 0.02,
    onComplete: () => {
      characters.forEach((_, i) => {
        if (typeof animState !== 'undefined' && animState[i]) {
          animState[i].current = 0;
        }
      });
    }
  });
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(initSignature, 150);
});

if (document.readyState === "complete") { initSignature(); } 
else { window.addEventListener("load", initSignature); }

if (typeof swup !== 'undefined') {
  swup.hooks.on('page:view', initSignature);
}
</script>

<script>
  // Initial page load bar
  window.addEventListener('load', () => {
    const bar = document.getElementById('page-load-bar');
    if (!bar) return;
    bar.classList.add('done');
    setTimeout(() => {
      bar.classList.add('fade-out');
      setTimeout(() => bar.remove(), 400);
    }, 200);


    const primaryAssets = [
        '/assets/images/sophia_pic.webp',
        '/assets/images/project_thumbnails/luminaria.webp',
        '/assets/images/project_thumbnails/wovenpoem.webp',
        '/assets/images/project_thumbnails/pillowfort.webp',
    ];

    const secondaryAssets = [
        '/assets/images/project_thumbnails/luminaria_hover.webp',
        '/assets/images/project_thumbnails/wovenpoem_hover.webp',
        '/assets/images/project_thumbnails/pillowfort_hover.webp',
    ];

    if ('requestIdleCallback' in window) {
        requestIdleCallback(async () => {
            // Wait for primaries to finish (or at least start) before hovers
            await preloadBatch(primaryAssets);
            
            // Optional: Add a slight delay or wait for another idle period
            requestIdleCallback(() => preloadBatch(secondaryAssets));
        });
    } else {
        preloadBatch(primaryAssets).then(() => preloadBatch(secondaryAssets));
    }
  });

  async function preloadBatch(urls) {
    const promises = urls.map(url => {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = url;
            img.onload = resolve;
            img.onerror = resolve; // Continue even if one fails
        });
    });
    return Promise.all(promises);
  }
</script>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
    function initContactDrawing() {
        const canvas = document.getElementById('drawingCanvas');
        // Only run if the canvas exists on the current page
        if (!canvas || canvas.dataset.initialized) return;
        canvas.dataset.initialized = "true";

        const ctx = canvas.getContext('2d');
        const statusMsg = document.getElementById('status-msg');
        const popup = document.getElementById('popup-overlay');
        const senderEmail = document.getElementById('sender-email');
        const sendEmailBtn = document.getElementById('send-email-btn');
        
        let painting = false;
        let color = '#000000';

        // Coordinates helper
        const getCoords = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        };

        const draw = (e) => {
            if (!painting) return;
            e.preventDefault();
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = color;
            const coords = getCoords(e);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
        };

        // Crayon listeners
        document.querySelectorAll('.crayon').forEach(el => {
            el.onclick = function() {
                color = this.style.backgroundColor;
                document.querySelectorAll('.crayon').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
            };
        });

        // Button actions
        document.getElementById('clear-btn').onclick = () => {
            if (confirm("Clear your drawing?")) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                statusMsg.innerText = "";
            }
        };
        document.getElementById('done-btn').onclick = () => popup.style.display = 'flex';
        document.getElementById('close-popup').onclick = () => popup.style.display = 'none';

        const getFlattenedData = () => {
            const temp = document.createElement('canvas');
            temp.width = canvas.width; temp.height = canvas.height;
            const tCtx = temp.getContext('2d');
            tCtx.fillStyle = '#fff'; tCtx.fillRect(0,0,temp.width,temp.height);
            tCtx.drawImage(canvas, 0, 0);
            return temp.toDataURL("image/jpeg", 0.9);
        };

        document.getElementById('download-btn').onclick = () => {
            const link = document.createElement('a');
            link.download = 'my-drawing.jpg';
            link.href = getFlattenedData();
            link.click();
        };

        sendEmailBtn.onclick = () => {
            const email = senderEmail.value.trim();
            if (!email) return alert("Please enter your email.");
            
            // Re-fetch keys from the data attributes on the container
            const container = document.getElementById('drawing-app-container');
            const pk = atob(container.dataset.pk); 
            const sID = container.dataset.sid;
            const tID = container.dataset.tid;

            emailjs.init(pk);
            sendEmailBtn.disabled = true;
            sendEmailBtn.innerText = "Sending...";

            emailjs.send(sID, tID, {
                from_name: email,
                to_email: 'hi@sophiadg.com',
                drawing_data: getFlattenedData()
            }).then(() => {
                statusMsg.style.color = "green";
                statusMsg.innerText = "Sent!";
                popup.style.display = 'none';
                sendEmailBtn.disabled = false;
                sendEmailBtn.innerText = "Send to Sophia";
            });
        };

        // Canvas Events
        canvas.onmousedown = (e) => { painting = true; draw(e); };
        window.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });
        canvas.onmousemove = draw;
        canvas.ontouchstart = (e) => { painting = true; draw(e); };
        canvas.ontouchend = () => { painting = false; ctx.beginPath(); };
        canvas.ontouchmove = draw;
    }

    // Swup Listener
    document.addEventListener('swup:content:replace', initContactDrawing);
    document.addEventListener('swup:page:view', initContactDrawing);
    // Fallback for direct load
    window.addEventListener('load', initContactDrawing);
</script>

</head>

<body data-section="{% if page.url == '/' or page.url == '/index.html' %}about{% elsif page.url contains 'projects' %}projects{% elsif page.url contains 'research' %}research{% elsif page.url contains 'contact' %}contact{% else %}about{% endif %}">
  <div id="page-load-bar"></div>
  <div id="page-loader" aria-label="Loading" role="status">
    <div class="loader-spinner"></div>
  </div>

  <div class="site-wrapper">

    <header class="site-header">

      <h1 class="site-title">
           {% include name_letters.svg %}
      </h1>

      <a class="menu-toggle" id="hamburger_button" aria-label="Toggle Menu" aria-expanded="false">
        {% include cardboard_buttons/hamburger.svg %}
      </a>

      <nav class="nav" id="main-nav">
        <a href="/" class="nav-item nav-about{% if page.url == '/' or page.url == '/index.html' %} active{% endif %}"
          id="about_button" data-swup-preload>
          {% include cardboard_buttons/about.svg %}
        </a>
        <a href="/projects" class="nav-item nav-projects{% if page.url contains 'projects' %} active{% endif %}"
          id="projects_button" data-swup-preload>
          {% include cardboard_buttons/projects.svg %}

        </a>
        <a href="/research" class="nav-item nav-research{% if page.url contains 'research' %} active{% endif %}"
          id="research_button" data-swup-preload>
          {% include cardboard_buttons/research.svg %}

        </a>
        <a href="/contact" class="nav-item nav-contact{% if page.url contains 'contact' %} active{% endif %}"
          id="contact_button" data-swup-preload>
          {% include cardboard_buttons/contact.svg %}
        </a>
      </nav>
    </header>

    <main id="swup" class="transition-fade page-content">
      {{ content }}
    </main>

  </div>
</body>

</html>
