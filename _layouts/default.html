<!DOCTYPE html>
<html lang="{{ site.lang | default: " en-US" }}">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <title>{{ page.title }} – Sophia Diggs-Galligan</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Commissioner:wght@100..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/buttons.css">

  <script src="https://unpkg.com/swup@4"></script>
  <script>
  const swup = new Swup();

  function updateActiveNav() {
    const currentPath = window.location.pathname;
    console.log("Swup changed page to:", currentPath); // Check your console!

    const navItems = document.querySelectorAll('.nav-item');

    navItems.forEach(item => {
      // Get the link destination (e.g., "/projects")
      const href = item.getAttribute('href');
      
      // Logic: If home, match exactly. If other, check if path starts with href.
      const isHome = currentPath === '/' || currentPath === '/index.html';
      const isMatch = (href === '/' && isHome) || (href !== '/' && currentPath.startsWith(href));

      if (isMatch) {
        item.classList.add('active');
        console.log("Activated:", href);
      } else {
        item.classList.remove('active');
      }
    });
  }

  // Hook into Swup's lifecycle
  swup.hooks.on('page:view', updateActiveNav);
  
  // Run once on initial page load
  window.addEventListener('DOMContentLoaded', updateActiveNav);
</script>
</head>

<body>
  <div class="site-wrapper">

    <header class="site-header">
      <h1 class="site-title"><a href="/">Sophia Diggs-Galligan</a></h1>

      <nav class="nav" id="main-nav">
        <a href="/" class="nav-item nav-about{% if page.url == '/' or page.url == '/index.html' %} active{% endif %}"
          id="about_button">
          {% include cardboard_buttons/about.svg %}
        </a>
        <a href="/projects" class="nav-item nav-projects{% if page.url contains 'projects' %} active{% endif %}"
          id="projects_button">
          {% include cardboard_buttons/projects.svg %}

        </a>
        <a href="/research" class="nav-item nav-research{% if page.url contains 'research' %} active{% endif %}"
          id="research_button">
          {% include cardboard_buttons/research.svg %}

        </a>
        <a href="/contact" class="nav-item nav-contact{% if page.url contains 'contact' %} active{% endif %}"
          id="contact_button">
          {% include cardboard_buttons/contact.svg %}
        </a>
      </nav>
    </header>

    <main id="swup" class="transition-fade page-content">
      {{ content }}
    </main>

  </div>
</body>

</html>
