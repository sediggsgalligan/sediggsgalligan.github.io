  <script>
  const swup = new Swup();

  function updateActiveNav() {
    const currentPath = window.location.pathname;
    console.log("Swup changed page to:", currentPath); // Check your console!

    const navItems = document.querySelectorAll('.nav-item');

    navItems.forEach(item => {
      // Get the link destination (e.g., "/projects")
      const href = item.getAttribute('href');
      
      // Logic: If home, match exactly. If other, check if path starts with href.
      const isHome = currentPath === '/' || currentPath === '/index.html';
      const isMatch = (href === '/' && isHome) || (href !== '/' && currentPath.startsWith(href));

      if (isMatch) {
        item.classList.add('active');
        console.log("Activated:", href);
      } else {
        item.classList.remove('active');
      }
    });
  }

  // Hook into Swup's lifecycle
  swup.hooks.on('page:view', updateActiveNav);
  
  // Run once on initial page load
  window.addEventListener('DOMContentLoaded', updateActiveNav);
</script>

<script>
  // Ensure Draggable is registered
gsap.registerPlugin(Draggable);

function initSignature() {
  const characters = document.querySelectorAll(".char");
  
  console.log("Found characters:", characters.length); // Should say 15+ 

  if (characters.length === 0) {
    console.error("GSAP: No elements with class '.char' found in the DOM.");
    return;
  }

  Draggable.create(characters, {
    type: "x",
    edgeResistance: 0.65,
    dragClickables: true,
    onDragStart: function() {
      console.log("Drag started on index:", this.target.getAttribute('data-index'));
    },
    onDrag: function() {
      console.log("Dragging index:", this.target.getAttribute('data-index'), "X:", this.x);
      
      // The repelling logic
      const draggedIndex = parseInt(this.target.getAttribute('data-index'));
      characters.forEach((other, i) => {
        if (i === draggedIndex) return;
        const dist = this.x + (draggedIndex * 20) - (i * 20); // Simplified dist check
        if (Math.abs(dist) < 30) {
          gsap.to(other, { x: dist > 0 ? -20 : 20, duration: 0.2 });
        } else {
          gsap.to(other, { x: 0, duration: 0.5 });
        }
      });
    },
    onDragEnd: function() {
      console.log("Drag ended");
      gsap.to(characters, { x: 0, duration: 0.8, ease: "elastic.out(1, 0.3)" });
    }
  });
}

// Jekyll/Swup compatibility: Run after everything is settled
if (document.readyState === "complete") {
  initSignature();
} else {
  window.addEventListener("load", initSignature);
}

// If using Swup, we must re-init after every page transition
if (typeof swup !== 'undefined') {
  swup.hooks.on('page:view', initSignature);
}
</script>
